name: Bug report
description: Report a GuitarToolkit bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target
      options:
        - Desktop app
        - VST3 plugin
        - Both
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GuitarToolkit version
      placeholder: v1.1.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Windows version:
        .NET runtime:
        Audio device:
        DAW, if applicable:
    validations:
      required: true
