name: Feature request / Идея функции
description: Suggest an improvement or new module / Предложить улучшение или новый модуль
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case / Задача или сценарий
      description: What should GuitarToolkit help with? / С чем должен помочь GuitarToolkit?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / Предложение
      description: What would you like to see? / Что вы хотите увидеть?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area / Область
      options:
        - Tuner / Тюнер
        - Metronome / Метроном
        - Chord Library / Аккорды
        - Fretboard & Scales / Гриф и гаммы
        - Interval Trainer / Интервалы
        - Progression Builder / Прогрессии
        - Circle of Fifths / Круг квинт
        - Tabs / Табы
        - Desktop app / Desktop-приложение
        - VST3 plugin / VST3-плагин
        - Documentation / Документация
        - Other / Другое
    validations:
      required: true
